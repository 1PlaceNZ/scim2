stages:
  - build
  - deploy


variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  PACKAGE_NAME: "scim2-sdk"
  PACKAGE_VERSION: "3.0.1-1place"
  
cache:
  paths:
    - .m2/repository

build:
  stage: build
  image: maven:3.9-eclipse-temurin-11
  script:
    - mvn clean install
  artifacts:
    paths:
      - scim2-sdk-client/target/scim2-sdk-client-3.0.1-1place.jar
      - scim2-sdk-common/target/scim2-sdk-common-3.0.1-1place.jar
    expire_in: 1 hour

deploy_to_registry:
  stage: deploy
  image:
    name: curlimages/curl:latest
  dependencies:
    - build
  script:
    - |
      curl --fail-with-body \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file scim2-sdk-client/target/scim2-sdk-client-${PACKAGE_VERSION}.jar \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}/scim2-sdk-client-${PACKAGE_VERSION}.jar?overwrite=true"
    - |
      curl --fail-with-body \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file scim2-sdk-common/target/scim2-sdk-common-${PACKAGE_VERSION}.jar \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}/scim2-sdk-common-${PACKAGE_VERSION}.jar?overwrite=true"
    - echo "Uploaded JARs to GitLab Package Registry under ${PACKAGE_NAME}/${PACKAGE_VERSION}"
